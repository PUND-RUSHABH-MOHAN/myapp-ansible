---
- name: Configure web servers
  hosts: webservers
  become: yes
  vars:
    rds_endpoint: "YOUR_RDS_ENDPOINT_HERE"   # paste terraform output here
    db_username: "admin"
    db_password: "YourStrongPassword123!"
    db_name: "myappdb"

  tasks:

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Apache, PHP, MySQL client
      apt:
        name:
          - apache2
          - php
          - php-mysql
          - mysql-client
          - libapache2-mod-php
        state: present

    - name: Start and enable Apache
      service:
        name: apache2
        state: started
        enabled: yes

    - name: Create app directory
      file:
        path: /var/www/html/app
        state: directory
        mode: '0755'

    - name: Deploy db_config.php
      template:
        src: templates/db_config.php.j2
        dest: /var/www/html/app/db_config.php
        mode: '0644'

    - name: Deploy index.php
      template:
        src: templates/index.php.j2
        dest: /var/www/html/index.php
        mode: '0644'

    - name: Remove default Apache page
      file:
        path: /var/www/html/index.html
        state: absent
